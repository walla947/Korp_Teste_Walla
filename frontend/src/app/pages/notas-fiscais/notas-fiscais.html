<h2>Notas Fiscais</h2>

<mat-card class="form-card">
  <mat-card-content>
    <h3>Nova Nota Fiscal</h3>
    <div class="form-inline">
      <mat-form-field appearance="outline">
        <mat-label>Produto</mat-label>
        <mat-select [(ngModel)]="produtoSelecionadoId">
          <mat-option *ngFor="let p of produtos" [value]="p.id">{{ p.descricao }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" [(ngModel)]="quantidade" min="1">
      </mat-form-field>

      <button mat-raised-button color="accent" (click)="adicionarItem()">Adicionar</button>
    </div>

    <table mat-table [dataSource]="itens" class="full-width" *ngIf="itens.length > 0">
      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Produto</th>
        <td mat-cell *matCellDef="let i">{{ i.produtoDescricao }}</td>
      </ng-container>
      <ng-container matColumnDef="quantidade">
        <th mat-header-cell *matHeaderCellDef>Quantidade</th>
        <td mat-cell *matCellDef="let i">{{ i.quantidade }}</td>
      </ng-container>
      <ng-container matColumnDef="remover">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let i; let idx = index">
          <button mat-icon-button color="warn" (click)="removerItem(idx)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['descricao','quantidade','remover']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['descricao','quantidade','remover']"></tr>
    </table>

    <button mat-raised-button color="primary" (click)="criarNota()" style="margin-top: 16px">
      Criar Nota Fiscal
    </button>
  </mat-card-content>
</mat-card>

<mat-card class="table-card">
  <mat-card-content>
    <h3>Notas Cadastradas</h3>
    <table mat-table [dataSource]="notas" class="full-width">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let n">{{ n.numero }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let n">{{ n.status }}</td>
      </ng-container>
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let n">
          <a mat-button color="primary" [routerLink]="['/impressao', n.id]">Ver / Imprimir</a>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['numero','status','acoes']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['numero','status','acoes']"></tr>
    </table>
  </mat-card-content>
</mat-card>
